  <script>window.Motion = window.FramerMotion;</script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      color: white;
    }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);

    .liquid-glass-strong::before {

      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);

      -webkit-mask-composite: xor;

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, useInView } = window.Motion;

    // Suppress specific framer motion dev warnings if needed (benign keys warning)
    const originalError = console.error;
    console.error = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('React does not recognize the')) return;
      originalError.apply(console, args);
    };

    const FadingVideo = ({ src, className, style }) => {
      const videoRef = useRef(null);
      const fadingOutRef = useRef(false);
      const rafRef = useRef(null);

      const fadeTo = (targetOpacity, duration) => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const startOpacity = videoRef.current ? parseFloat(videoRef.current.style.opacity) || 0 : 0;
        const startTime = performance.now();

        const animate = (currentTime) => {
          if (!videoRef.current) return;
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const currentOpacity = startOpacity + (targetOpacity - startOpacity) * progress;
          videoRef.current.style.opacity = currentOpacity;

          if (progress < 1) {
            rafRef.current = requestAnimationFrame(animate);
          }
        };
        rafRef.current = requestAnimationFrame(animate);
      };

      const handleLoadedData = () => {
        if (!videoRef.current) return;
        videoRef.current.style.opacity = 0;
        videoRef.current.play().catch(e => console.log('Autoplay prevented', e));
        fadeTo(1, 500);
      };

      const handleTimeUpdate = () => {
        if (!videoRef.current) return;
        const remaining = videoRef.current.duration - videoRef.current.currentTime;
        if (!fadingOutRef.current && remaining <= 0.55 && remaining > 0) {
          fadingOutRef.current = true;
          fadeTo(0, 500);
        }
      };

      const handleEnded = () => {
        if (!videoRef.current) return;
        videoRef.current.style.opacity = 0;
        setTimeout(() => {
          if (!videoRef.current) return;
          videoRef.current.currentTime = 0;
          videoRef.current.play().catch(e => console.log('Autoplay prevented', e));
          fadingOutRef.current = false;
          fadeTo(1, 500);
        }, 100);
      };

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        video.addEventListener('loadeddata', handleLoadedData);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata', handleLoadedData);
          video.removeEventListener('timeupdate', handleTimeUpdate);
          video.removeEventListener('ended', handleEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          src={src}
          className={className}
          style={{ ...style, opacity: 0 }}
          autoPlay
          muted
          playsInline
          preload="auto"
        />
      );
    };

    window.FadingVideo = FadingVideo;

    const BlurText = ({ text, className }) => {
      const ref = useRef(null);
      const isInView = useInView(ref, { amount: 0.1, once: true });
      const words = text.split(" ");

      return (
        <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={isInView ? {
                filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0]
              } : {}}
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000
              }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    };

    window.BlurText = BlurText;

    const Hero = () => {
      return (
        <section className="relative w-full min-h-screen overflow-hidden bg-black flex flex-col">
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"

            style={{ width: "120%", height: "120%" }}

            </div>
            
            <div className="hidden lg:flex items-center liquid-glass rounded px-1.5 py-1.5">

                  {link}
                </a>

              <button className="ml-2 bg-white text-black rounded px-3 py-1.5 text-sm font-medium font-body flex items-center gap-1 whitespace-nowrap hover:bg-gray-200 transition-colors">
                Claim a Spot

                  <path d="M7 17L17 7" />

                </svg>
              </button>
            </div>

            <div className="w-12 h-12 invisible shrink-0"></div>
          </nav>

          <div className="relative z-10 flex-1 flex flex-col items-center justify-center pt-24 px-4 text-center">
            <motion.div
              initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}

            </motion.div>

            <BlurText 
              text="Venture Past Our Sky Across the Universe"
              className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl justify-center tracking-[-4px]"
            />

            <motion.p
              initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
              animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
              transition={{ ease: "easeOut", delay: 0.8, duration: 0.8 }}
              className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight"
            >
              Discover the universe in ways once unimaginable. Our pioneering vessels and breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
            </motion.p>

            <motion.div
              initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
              animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
              transition={{ ease: "easeOut", delay: 1.1, duration: 0.8 }}
              className="flex flex-col sm:flex-row items-center gap-6 mt-6"
            >
              <button className="liquid-glass-strong rounded-full px-5 py-2.5 text-sm font-medium text-white flex items-center gap-2 hover:bg-white/10 transition-colors">
                Start Your Voyage
                <svg className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M7 17L17 7" />
                  <path d="M7 7h10v10" />
                </svg>
              </button>
              <button className="flex items-center gap-2 text-white text-sm font-medium hover:text-white/80 transition-colors">
                View Liftoff
                <svg className="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
                  <polygon points="6 4 20 12 6 20 6 4" />
                </svg>
              </button>
            </motion.div>

            <motion.div
              initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
              animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
              transition={{ ease: "easeOut", delay: 1.3, duration: 0.8 }}
              className="flex flex-wrap items-stretch justify-center gap-4 mt-8"
            >
              <div className="liquid-glass rounded-[1.25rem] p-5 w-[220px] flex flex-col text-left">
                <svg className="w-7 h-7 text-white mb-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
                <div className="mt-8">
                  <div className="text-4xl font-heading italic text-white tracking-[-1px] leading-none">34.5 Min</div>
                  <div className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</div>
                </div>
              </div>
              <div className="liquid-glass rounded-[1.25rem] p-5 w-[220px] flex flex-col text-left">
                <svg className="w-7 h-7 text-white mb-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <line x1="2" y1="12" x2="22" y2="12" />
                  <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                </svg>
                <div className="mt-8">
                  <div className="text-4xl font-heading italic text-white tracking-[-1px] leading-none">2.8B+</div>
                  <div className="text-xs text-white font-body font-light mt-2">Users Across the Globe</div>
                </div>
              </div>
            </motion.div>
          </div>

          <motion.div
            initial={{ filter: 'blur(10px)', opacity: 0, y: 20 }}
            animate={{ filter: 'blur(0px)', opacity: 1, y: 0 }}
            transition={{ ease: "easeOut", delay: 1.4, duration: 0.8 }}
            className="relative z-10 flex flex-col items-center gap-4 pb-8"
          >
            <div className="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white">
              Collaborating with top aerospace pioneers globally
            </div>
            <div className="flex flex-wrap justify-center gap-12 md:gap-16 font-heading italic text-white text-2xl md:text-3xl tracking-tight">
              <span>Aeon</span>
              <span>Vela</span>
              <span>Apex</span>
              <span>Orbit</span>
              <span>Zeno</span>
            </div>
          </motion.div>
        </section>
      );
    };

    window.Hero = Hero;

    const Capabilities = () => {
      const cards = [
        {
          icon: (
            <svg className="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z" />
            </svg>
          ),
          tags: ['Natural Context', 'Photo Realism', 'Infinite Settings', 'Eco-Vibe'],
          title: 'AI Scenery',
          body: 'AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests.'
        },
        {
          icon: (
            <svg className="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z" />
            </svg>
          ),
          tags: ['Scale Fast', 'Visual Consistency', 'Time Saver', 'Ready to Post'],
          title: 'Batch Production',
          body: 'Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.'
        },
        {
          icon: (
            <svg className="h-6 w-6 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z" />
            </svg>
          ),
          tags: ['Ray Tracing', 'Physical Shadows', 'Studio Quality', 'Sunlight Sync'],
          title: 'Smart Lighting',
          body: 'Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight.'
        }
      ];

      return (
        <section className="relative w-full min-h-screen bg-black flex flex-col">
          <FadingVideo
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
            className="absolute inset-0 w-full h-full object-cover z-0"
          />
          
          <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">
            <div className="mb-auto">
              <div className="text-sm font-body text-white/80 mb-6">// Capabilities</div>
              <h2 className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]">
                Production<br/>evolved
              </h2>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
              {cards.map((card, idx) => (
                <div key={idx} className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col">
                  <div className="flex items-start gap-4">
                    <div className="w-[44px] h-[44px] liquid-glass rounded-[0.75rem] flex items-center justify-center shrink-0">
                      {card.icon}
                    </div>
                    <div className="flex-1"></div>
                    <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
                      {card.tags.map((tag, tIdx) => (
                        <span key={tIdx} className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">

                      {card.title}

                      {card.body}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    window.Capabilities = Capabilities;

    const App = () => {
      return (
        <main className="w-full bg-black">
          <Hero />
          <Capabilities />
        </main>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
